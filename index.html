<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Quest Explorer - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-med: #16213e;
            --accent: #e94560;
            --secondary: #4ecca3;
            --text-light: #f8fafc;
            --yellow: #facc15;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow: hidden;
            touch-action: none;
            margin: 0;
        }

        /* --- Loading Screen Styles --- */
        #authOverlay {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loader-container {
            width: 300px;
            background: rgba(0,0,0,0.5);
            border: 4px solid var(--bg-med);
            padding: 4px;
            margin-top: 20px;
            border-radius: 4px;
        }

        #loadingBar {
            width: 0%;
            height: 20px;
            background: var(--yellow);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--yellow);
        }

        #loadingStatus {
            font-size: 8px;
            margin-top: 15px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- UI Styles --- */
        canvas {
            image-rendering: pixelated;
            background-color: var(--bg-med);
            border: 4px solid #0f3460;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .btn {
            transition: all 0.2s;
            cursor: pointer;
            border-bottom: 4px solid rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .pixel-card {
            background-color: var(--bg-med);
            border: 4px solid #0f3460;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse { animation: pulse 1.5s infinite; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f3460; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Advanced Loading Screen -->
    <div id="authOverlay" class="fixed inset-0">
        <h1 class="text-3xl text-yellow-400 mb-2 tracking-tighter">QUEST EXPLORER</h1>
        <p class="text-[8px] text-gray-400 mb-8 pulse">Establishing secure link...</p>
        
        <div class="loader-container">
            <div id="loadingBar"></div>
        </div>
        <div id="loadingStatus">Awaiting system boot...</div>
        <div id="loadingPercentage" class="mt-2 text-[10px] text-gray-500">0%</div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="hidden flex flex-col items-center gap-6 max-w-md w-full">
        <h1 class="text-2xl text-yellow-400 mb-4 drop-shadow-md">MAIN MENU</h1>
        
        <div class="pixel-card p-6 rounded-xl w-full">
            <h2 class="text-xs mb-4 text-gray-400">CHARACTER PROFILE</h2>
            <div class="flex items-center gap-4 mb-6">
                <div id="playerPreview" class="w-14 h-14 rounded border-4 border-white/20 shadow-inner"></div>
                <div class="flex-1">
                    <input id="userNameInput" type="text" placeholder="GUEST_USER" maxlength="10" class="w-full bg-black/40 border-2 border-[#0f3460] p-3 text-[10px] outline-none focus:border-yellow-500 text-yellow-400">
                </div>
            </div>

            <button id="playSingleBtn" class="btn w-full bg-yellow-500 text-black hover:bg-yellow-400 p-4 rounded text-xs mb-6 font-bold">SOLO MISSION</button>
            
            <div class="border-t-2 border-[#0f3460] pt-6">
                <h2 class="text-xs mb-4 text-gray-400">CO-OP NETWORKING</h2>
                <button id="createLobbyBtn" class="btn w-full bg-emerald-600 hover:bg-emerald-500 p-4 rounded text-xs mb-3">HOST SERVER</button>
                
                <div class="flex gap-2">
                    <input id="lobbyCodeInput" type="text" placeholder="CODE" maxlength="5" class="w-1/3 bg-black/40 border-2 border-[#0f3460] p-3 text-[10px] uppercase text-center outline-none focus:border-yellow-500">
                    <button id="joinLobbyBtn" class="btn flex-1 bg-sky-600 hover:bg-sky-500 p-4 rounded text-xs">JOIN CODE</button>
                </div>
            </div>
        </div>

        <div class="text-[7px] text-gray-500 mt-4 text-center leading-loose">
            CONTROL: [W][A][S][D] TO MOVE • [T] TO CHAT<br>
            OBJECTIVE: RECOVER ALL GEMS IN SECTOR
        </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="hidden flex flex-col items-center gap-6 max-w-md w-full">
        <h1 class="text-xl text-yellow-400">SECTOR: <span id="displayLobbyCode" class="text-white">-----</span></h1>
        
        <div class="pixel-card p-6 rounded-xl w-full min-h-[220px]">
            <h2 class="text-xs mb-4 text-gray-400">TEAM ROSTER</h2>
            <div id="lobbyPlayerList" class="space-y-3"></div>
        </div>

        <div class="flex gap-4 w-full">
            <button id="backToMenuBtn" class="btn flex-1 bg-rose-600 hover:bg-rose-500 p-4 rounded text-[10px]">ABORT</button>
            <button id="startGameBtn" class="btn flex-1 bg-yellow-500 hover:bg-yellow-400 text-black p-4 rounded text-[10px] hidden font-bold">DEPART</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden flex flex-col items-center">
        <div class="mb-4 flex justify-between w-full items-center px-4 bg-black/20 p-2 rounded-t-lg border-x-4 border-t-4 border-[#0f3460]">
            <div class="flex flex-col gap-1">
                <div class="text-[7px] text-gray-500" id="lobbyInfoContainer">SECTOR: <span id="gameLobbyCode" class="text-white"></span></div>
                <div class="text-[10px] text-yellow-400">RESOURCES: <span id="scoreDisplay">0</span></div>
            </div>
            <div id="playerStats" class="flex gap-2"></div>
        </div>

        <div class="relative">
            <canvas id="gameCanvas"></canvas>
            
            <!-- HUD / Chat -->
            <div id="chatOverlay" class="absolute bottom-4 left-4 right-4 pointer-events-none">
                <div id="chatMessages" class="max-h-24 overflow-y-auto mb-3 flex flex-col gap-1 text-[8px] bg-black/40 p-2 rounded"></div>
                <div class="flex gap-2 pointer-events-auto">
                    <input id="chatInput" type="text" placeholder="TYPE MESSAGE..." class="flex-1 bg-black/80 border-2 border-white/10 p-2 text-[8px] outline-none focus:border-yellow-500">
                </div>
            </div>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-6">
        <div class="pixel-card border-yellow-500 p-10 rounded-xl text-center max-w-sm">
            <div class="text-6xl mb-6">✨</div>
            <h2 id="modalTitle" class="text-xl mb-4 text-yellow-400">MISSION SUCCESS</h2>
            <p id="modalBody" class="text-[9px] text-gray-400 mb-8 leading-relaxed"></p>
            <button id="modalBtn" class="btn bg-yellow-500 text-black px-10 py-4 text-xs rounded font-bold">RETURN TO BASE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Core Application State ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quest-explorer-v2';
        
        let app, auth, db;
        let user = null;
        let currentLobby = null;
        let lobbyData = null;
        let isSinglePlayer = false;
        let unsubscribeLobby = null;
        let myPlayerColor = `#${Math.floor(Math.random()*16777215).toString(16)}`;

        const TILE_SIZE = 40;
        const GRID_WIDTH = 15;
        const GRID_HEIGHT = 12;
        const MOVE_SPEED = 0.08; 

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = TILE_SIZE * GRID_WIDTH;
        canvas.height = TILE_SIZE * GRID_HEIGHT;

        // --- Helper: Smooth Loading Animation ---
        const updateLoader = (percent, status) => {
            const bar = document.getElementById('loadingBar');
            const statusEl = document.getElementById('loadingStatus');
            const percentEl = document.getElementById('loadingPercentage');
            bar.style.width = percent + '%';
            statusEl.innerText = status;
            percentEl.innerText = Math.round(percent) + '%';
        };

        // --- Initialization Sequence (Rule 3) ---
        const startApp = async () => {
            try {
                updateLoader(10, "Initializing Engines...");
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                updateLoader(30, "Connecting to Satellite...");
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                updateLoader(60, "Verifying Identity...");
                onAuthStateChanged(auth, async (u) => {
                    user = u;
                    if (user) {
                        updateLoader(85, "Generating Sector Maps...");
                        // Fake delay for "complexity" and visual effect
                        setTimeout(() => {
                            updateLoader(100, "System Ready");
                            setTimeout(() => {
                                document.getElementById('authOverlay').style.display = 'none';
                                document.getElementById('mainMenu').classList.remove('hidden');
                            }, 500);
                        }, 800);
                    }
                });
            } catch (err) {
                updateLoader(0, "Connection Failed!");
                console.error(err);
            }
        };

        // --- Input Management ---
        const keys = {};
        window.addEventListener('keydown', e => {
            if (document.activeElement === document.getElementById('chatInput')) return;
            keys[e.code] = true;
            if (e.code === 'KeyT') {
                e.preventDefault();
                document.getElementById('chatInput').focus();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- UI Component Registry ---
        const ui = {
            mainMenu: document.getElementById('mainMenu'),
            lobbyScreen: document.getElementById('lobbyScreen'),
            gameScreen: document.getElementById('gameScreen'),
            playerPreview: document.getElementById('playerPreview'),
            userNameInput: document.getElementById('userNameInput'),
            lobbyCodeInput: document.getElementById('lobbyCodeInput'),
            playerList: document.getElementById('lobbyPlayerList'),
            modal: document.getElementById('modalOverlay'),
            chatInput: document.getElementById('chatInput'),
            chatMessages: document.getElementById('chatMessages')
        };

        ui.playerPreview.style.backgroundColor = myPlayerColor;

        // --- Lobby Logic (Rule 1 & 2) ---
        const getLobbyDoc = (code) => doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', code.toUpperCase());

        function generateMap() {
            const walls = [];
            const gems = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (x === 0 || x === GRID_WIDTH - 1 || y === 0 || y === GRID_HEIGHT - 1) walls.push({x, y});
                    else if (Math.random() > 0.88) walls.push({x, y});
                    else if (Math.random() > 0.95) gems.push({x, y, id: Math.random().toString(36).substr(2, 9)});
                }
            }
            return { walls, gems };
        }

        async function startSinglePlayer() {
            isSinglePlayer = true;
            const name = ui.userNameInput.value || "SOLO_UNIT";
            const map = generateMap();
            
            lobbyData = {
                status: 'playing',
                walls: JSON.stringify(map.walls),
                gems: map.gems,
                messages: [],
                players: {
                    "local": { id: "local", name, color: myPlayerColor, x: 1, y: 1, targetX: 1, targetY: 1, score: 0 }
                }
            };
            
            ui.mainMenu.classList.add('hidden');
            ui.gameScreen.classList.remove('hidden');
            document.getElementById('lobbyInfoContainer').classList.add('hidden');
            document.getElementById('chatOverlay').classList.add('hidden');
        }

        async function createLobby() {
            if (!user) return;
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            const name = ui.userNameInput.value || "COMMANDER";
            const map = generateMap();

            const initialLobby = {
                code, hostId: user.uid, status: 'waiting',
                walls: JSON.stringify(map.walls),
                gems: map.gems,
                messages: [],
                players: {
                    [user.uid]: { id: user.uid, name, color: myPlayerColor, x: 1, y: 1, targetX: 1, targetY: 1, score: 0, lastSeen: Date.now() }
                }
            };

            await setDoc(getLobbyDoc(code), initialLobby);
            joinLobby(code);
        }

        async function joinLobby(code) {
            if (!user) return;
            isSinglePlayer = false;
            const lobbyRef = getLobbyDoc(code);
            const snap = await getDoc(lobbyRef);

            if (!snap.exists()) {
                alert("ERR: Sector not found!");
                return;
            }

            const name = ui.userNameInput.value || "RECRUIT";
            const currentPlayers = snap.data().players || {};
            
            currentPlayers[user.uid] = { id: user.uid, name, color: myPlayerColor, x: 1, y: 1, targetX: 1, targetY: 1, score: 0, lastSeen: Date.now() };

            await updateDoc(lobbyRef, { players: currentPlayers });
            startListening(code);
            
            ui.mainMenu.classList.add('hidden');
            ui.lobbyScreen.classList.remove('hidden');
            document.getElementById('displayLobbyCode').innerText = code;
        }

        function startListening(code) {
            if (unsubscribeLobby) unsubscribeLobby();
            currentLobby = code;

            unsubscribeLobby = onSnapshot(getLobbyDoc(code), (snap) => {
                if (!snap.exists()) { exitLobby(); return; }
                lobbyData = snap.data();
                updateUI();
            });
        }

        function updateUI() {
            if (!lobbyData) return;

            if (ui.lobbyScreen.offsetParent) {
                ui.playerList.innerHTML = '';
                Object.values(lobbyData.players).forEach(p => {
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 bg-black/30 rounded border-l-4 border-yellow-500/20";
                    div.innerHTML = `<div class="w-5 h-5 rounded shadow" style="background:${p.color}"></div><span class="text-[9px]">${p.name}</span> ${p.id === lobbyData.hostId ? '<span class="text-yellow-400 text-[7px] ml-auto">[HOST]</span>' : ''}`;
                    ui.playerList.appendChild(div);
                });

                if (user.uid === lobbyData.hostId) document.getElementById('startGameBtn').classList.remove('hidden');
            }

            if (lobbyData.status === 'playing' && !ui.gameScreen.offsetParent) {
                ui.lobbyScreen.classList.add('hidden');
                ui.gameScreen.classList.remove('hidden');
                document.getElementById('gameLobbyCode').innerText = lobbyData.code || "OFFLINE";
            }

            if (!isSinglePlayer) syncChat();
        }

        async function exitLobby() {
            if (unsubscribeLobby) unsubscribeLobby();
            if (!isSinglePlayer && currentLobby && user) {
                const ref = getLobbyDoc(currentLobby);
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    const ps = snap.data().players;
                    delete ps[user.uid];
                    if (Object.keys(ps).length === 0) await deleteDoc(ref);
                    else await updateDoc(ref, { players: ps });
                }
            }
            currentLobby = null;
            isSinglePlayer = false;
            ui.lobbyScreen.classList.add('hidden');
            ui.gameScreen.classList.add('hidden');
            ui.mainMenu.classList.remove('hidden');
        }

        // --- Game Engine Logic ---
        let lastUpdate = 0;
        function gameLoop() {
            if (lobbyData && lobbyData.status === 'playing') {
                updatePhysics();
                drawGame();
            }
            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            const myId = isSinglePlayer ? "local" : user.uid;
            const me = lobbyData.players[myId];
            if (!me) return;

            if (me.x === me.targetX && me.y === me.targetY) {
                let nx = me.targetX, ny = me.targetY;
                if (keys['KeyW']) ny--;
                else if (keys['KeyS']) ny++;
                else if (keys['KeyA']) nx--;
                else if (keys['KeyD']) nx++;

                if (nx !== me.targetX || ny !== me.targetY) {
                    const walls = JSON.parse(lobbyData.walls);
                    if (!walls.some(w => w.x === nx && w.y === ny)) {
                        me.targetX = nx;
                        me.targetY = ny;
                    }
                }
            }

            me.x += (me.targetX - me.x) * MOVE_SPEED;
            me.y += (me.targetY - me.y) * MOVE_SPEED;

            if (Math.abs(me.x - me.targetX) < 0.01) me.x = me.targetX;
            if (Math.abs(me.y - me.targetY) < 0.01) me.y = me.targetY;

            let collectedId = null;
            const newGems = (lobbyData.gems || []).filter(gem => {
                const dist = Math.sqrt(Math.pow(me.x - gem.x, 2) + Math.pow(me.y - gem.y, 2));
                if (dist < 0.5) { collectedId = gem.id; return false; }
                return true;
            });

            if (collectedId) {
                me.score += 10;
                lobbyData.gems = newGems;
            }

            const now = Date.now();
            if (!isSinglePlayer && (now - lastUpdate > 100 || collectedId)) {
                const ref = getLobbyDoc(currentLobby);
                const updateObj = { [`players.${user.uid}`]: me };
                if (collectedId) updateObj.gems = newGems;
                updateDoc(ref, updateObj);
                lastUpdate = now;
            }

            if (lobbyData.gems && lobbyData.gems.length === 0) showWin();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const walls = JSON.parse(lobbyData.walls);

            // Walls (Grid)
            ctx.fillStyle = '#0f3460';
            walls.forEach(w => {
                ctx.fillRect(w.x * TILE_SIZE, w.y * TILE_SIZE, TILE_SIZE - 2, TILE_SIZE - 2);
            });

            // Gems (Collectibles)
            ctx.fillStyle = '#e94560';
            (lobbyData.gems || []).forEach(gem => {
                ctx.beginPath();
                ctx.arc(gem.x * TILE_SIZE + TILE_SIZE/2, gem.y * TILE_SIZE + TILE_SIZE/2, 7, 0, Math.PI * 2);
                ctx.fill();
            });

            // Players (Entities)
            let totalScore = 0;
            Object.values(lobbyData.players).forEach(p => {
                totalScore += p.score;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x * TILE_SIZE + 6, p.y * TILE_SIZE + 6, TILE_SIZE - 12, TILE_SIZE - 12);
                
                ctx.fillStyle = 'white';
                ctx.font = '6px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, p.x * TILE_SIZE + TILE_SIZE/2, p.y * TILE_SIZE - 6);
                
                // Entity Features (Eyes)
                ctx.fillRect(p.x * TILE_SIZE + 12, p.y * TILE_SIZE + 14, 4, 4);
                ctx.fillRect(p.x * TILE_SIZE + 24, p.y * TILE_SIZE + 14, 4, 4);
            });

            document.getElementById('scoreDisplay').innerText = totalScore;
        }

        // --- Interaction Handlers ---
        async function sendMessage() {
            if (isSinglePlayer) return;
            const text = ui.chatInput.value.trim();
            if (!text || !currentLobby) return;
            ui.chatInput.value = '';
            const msgs = (lobbyData.messages || []).concat({ sender: lobbyData.players[user.uid].name, text, time: Date.now() }).slice(-12);
            await updateDoc(getLobbyDoc(currentLobby), { messages: msgs });
        }

        function syncChat() {
            if (!lobbyData.messages) return;
            ui.chatMessages.innerHTML = lobbyData.messages.map(m => `<div><span class="text-yellow-400">${m.sender}:</span> ${m.text}</div>`).join('');
            ui.chatMessages.scrollTop = ui.chatMessages.scrollHeight;
        }

        function showWin() {
            const myId = isSinglePlayer ? "local" : user.uid;
            const p = lobbyData.players[myId];
            document.getElementById('modalBody').innerText = `SECTOR SECURED. RESOURCES RECOVERED: ${p.score} UNITS. ALL TEAM MEMBERS SAFE.`;
            ui.modal.classList.remove('hidden');
        }

        // --- UI Events ---
        document.getElementById('playSingleBtn').onclick = startSinglePlayer;
        document.getElementById('createLobbyBtn').onclick = createLobby;
        document.getElementById('joinLobbyBtn').onclick = () => {
            const code = ui.lobbyCodeInput.value.trim().toUpperCase();
            if (code) joinLobby(code);
        };
        document.getElementById('startGameBtn').onclick = async () => {
            if (currentLobby && lobbyData.hostId === user.uid) await updateDoc(getLobbyDoc(currentLobby), { status: 'playing' });
        };
        document.getElementById('backToMenuBtn').onclick = exitLobby;
        document.getElementById('modalBtn').onclick = () => { ui.modal.classList.add('hidden'); exitLobby(); };
        ui.chatInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Start Bootup
        startApp();
        gameLoop();
    </script>
</body>
</html>
