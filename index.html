<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Maze - Reveal the Walls</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            user-select: none;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            transition: opacity 0.5s;
            z-index: 100;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #level-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
        }

        #ability-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
        }

        .sonar-ready { color: #00FF00; font-weight: bold; }
        .sonar-charging { color: #666; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-indicator">Level 1</div>
    </div>

    <div id="ability-bar"></div>

    <div id="message-box">
        <div id="tutorial">
            <h2>Welcome to the Darkness</h2>
            <p>Hitting walls releases <strong>sticky red dots</strong>.</p>
            <p>Use them to map out the invisible maze.</p>
            <p style="color: #4CAF50;">Return to the top-left circle to start.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelIndicator = document.getElementById('level-indicator');
        const messageBox = document.getElementById('message-box');
        const abilityBar = document.getElementById('ability-bar');

        let currentLevel = 0;
        let isDead = false;
        let gameStarted = false;
        let levelCleared = false; 
        let mousePos = { x: 0, y: 0 };
        let lastProcessedPos = { x: 0, y: 0 };
        
        let splats = []; 
        let walls = []; 
        let goal = { x: 0, y: 0, radius: 15 };
        let startZone = { x: 50, y: 50, radius: 40 };

        let sonarUnlocked = true;
        let sonarActive = false;
        let sonarRadius = 0;
        let sonarCooldown = 0;
        const SONAR_MAX_RADIUS = 1000;
        const SONAR_SPEED = 10;
        const SONAR_COOLDOWN_TIME = 600; 
        let wallAlphaState = [];

        const GRAVITY = 0.15;
        const SPLAT_COLOR = 'rgba(200, 0, 0, 0.7)';

        class MazeGenerator {
            constructor(cols, rows) {
                this.cols = cols;
                this.rows = rows;
                this.grid = Array.from({ length: rows }, (_, r) => 
                    Array.from({ length: cols }, (_, c) => ({ r, c, visited: false, walls: [true, true, true, true] }))
                );
            }

            generate() {
                const stack = [];
                const start = this.grid[0][0];
                start.visited = true;
                stack.push(start);

                while (stack.length > 0) {
                    const current = stack.pop();
                    const neighbors = this.getNeighbors(current);
                    if (neighbors.length > 0) {
                        stack.push(current);
                        const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                        this.removeWalls(current, next);
                        next.visited = true;
                        stack.push(next);
                    }
                }
                return this.toRects();
            }

            getNeighbors(cell) {
                const { r, c } = cell;
                return [
                    r > 0 && this.grid[r-1][c], r < this.rows-1 && this.grid[r+1][c],
                    c > 0 && this.grid[r][c-1], c < this.cols-1 && this.grid[r][c+1]
                ].filter(n => n && !n.visited);
            }

            removeWalls(a, b) {
                if (a.r > b.r) { a.walls[0] = false; b.walls[2] = false; }
                else if (a.r < b.r) { a.walls[2] = false; b.walls[0] = false; }
                else if (a.c > b.c) { a.walls[3] = false; b.walls[1] = false; }
                else if (a.c < b.c) { a.walls[1] = false; b.walls[3] = false; }
            }

            toRects() {
                const rects = [];
                const w = canvas.width / this.cols;
                const h = canvas.height / this.rows;
                const t = 8 + (currentLevel * 1.2);
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        const cell = this.grid[r][c];
                        const x = c * w, y = r * h;
                        if (cell.walls[0]) rects.push({ x, y, w, h: t });
                        if (cell.walls[1]) rects.push({ x: x + w - t, y, w: t, h });
                        if (cell.walls[2]) rects.push({ x, y: y + h - t, w, h: t });
                        if (cell.walls[3]) rects.push({ x, y, w: t, h });
                    }
                }
                return rects;
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupLevel();
        }

        function setupLevel() {
            levelIndicator.innerText = `Level ${currentLevel + 1}`;
            const size = 5 + currentLevel; 
            const gen = new MazeGenerator(Math.floor(size * 1.4), size);
            const allWalls = gen.generate();

            walls = allWalls.filter(w => {
                const dS = Math.hypot((w.x + w.w/2) - startZone.x, (w.y + w.h/2) - startZone.y);
                const dG = Math.hypot((w.x + w.w/2) - (canvas.width-50), (w.y + w.h/2) - (canvas.height-50));
                return dS > 90 && dG > 90;
            });

            wallAlphaState = walls.map(() => 0);
            goal.x = canvas.width - 50;
            goal.y = canvas.height - 50;
        }

        function checkPathCollision(x1, y1, x2, y2) {
            const distance = Math.hypot(x2 - x1, y2 - y1);
            const steps = Math.ceil(distance / 3);
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const cx = x1 + (x2 - x1) * t;
                const cy = y1 + (y2 - y1) * t;
                const hit = walls.some(w => cx > w.x && cx < w.x + w.w && cy > w.y && cy < w.y + w.h) 
                          || cx < 2 || cx > canvas.width-2 || cy < 2 || cy > canvas.height-2;
                if (hit) return { hit: true, x: cx, y: cy };
            }
            return { hit: false };
        }

        function spawnShrapnel(x, y) {
            for (let i = 0; i < 3; i++) {
                splats.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.7) * 8,
                    r: 4 + Math.random() * 4,
                    settled: false
                });
            }
        }

        function drawArrow(fX, fY, tX, tY) {
            const len = 15;
            const dx = tX - fX, dy = tY - fY;
            const angle = Math.atan2(dy, dx);
            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(fX, fY);
            ctx.lineTo(tX, tY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tX, tY);
            ctx.lineTo(tX - len * Math.cos(angle - Math.PI/6), tY - len * Math.sin(angle - Math.PI/6));
            ctx.lineTo(tX - len * Math.cos(angle + Math.PI/6), tY - len * Math.sin(angle + Math.PI/6));
            ctx.closePath();
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fill();
            ctx.restore();
        }

        function update() {
            if (sonarCooldown > 0) {
                sonarCooldown--;
                abilityBar.innerHTML = `<span class="sonar-charging">Sonar Recharging: ${Math.floor((1 - sonarCooldown/600)*100)}%</span>`;
                if (sonarCooldown === 0) abilityBar.innerHTML = '<span class="sonar-ready">Sonar Ready: [Right Click]</span>';
            }
            if (sonarActive) {
                sonarRadius += SONAR_SPEED;
                if (sonarRadius > SONAR_MAX_RADIUS) sonarActive = false;
            }
            wallAlphaState = wallAlphaState.map(a => Math.max(0, a - 0.015));

            splats.forEach(s => {
                if (!s.settled) {
                    s.x += s.vx;
                    s.y += s.vy;
                    s.vy += GRAVITY;
                    s.vx *= 0.99;

                    // Check if shrapnel hits a wall to stick to it
                    const hit = walls.some(w => s.x > w.x && s.x < w.x + w.w && s.y > w.y && s.y < w.y + w.h)
                                || s.x < 2 || s.x > canvas.width-2 || s.y < 2 || s.y > canvas.height-2;
                    
                    if (hit || s.y > canvas.height - 5) {
                        s.settled = true;
                        s.vx = 0;
                        s.vy = 0;
                    }
                }
            });

            if (isDead) {
                if (Math.hypot(mousePos.x - startZone.x, mousePos.y - startZone.y) < startZone.radius) {
                    if (levelCleared) { currentLevel++; splats = []; setupLevel(); levelCleared = false; }
                    isDead = false; messageBox.classList.add('hidden'); gameStarted = true;
                    lastProcessedPos = { ...mousePos };
                }
            } else if (gameStarted) {
                const collision = checkPathCollision(lastProcessedPos.x, lastProcessedPos.y, mousePos.x, mousePos.y);
                if (collision.hit) {
                    spawnShrapnel(collision.x, collision.y);
                    isDead = true; 
                    messageBox.innerHTML = "<h2>You Died!</h2><p>Marker placed.</p><p>Return to start.</p>"; 
                    messageBox.classList.remove('hidden');
                } else if (Math.hypot(mousePos.x - goal.x, mousePos.y - goal.y) < goal.radius) {
                    levelCleared = true; isDead = true; messageBox.innerHTML = "<h2>Level Clear!</h2><p>Return to start.</p>"; messageBox.classList.remove('hidden');
                }
                lastProcessedPos = { ...mousePos };
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isDead || !gameStarted) {
                ctx.beginPath(); ctx.arc(startZone.x, startZone.y, startZone.radius, 0, Math.PI*2);
                ctx.strokeStyle = '#333'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
                if (isDead) drawArrow(mousePos.x, mousePos.y, startZone.x, startZone.y);
            }

            if (sonarActive) {
                ctx.beginPath(); ctx.arc(mousePos.x, mousePos.y, sonarRadius, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(0, 150, 255, ${1 - sonarRadius/SONAR_MAX_RADIUS})`; ctx.stroke();
                walls.forEach((w, i) => {
                    const cx = Math.max(w.x, Math.min(mousePos.x, w.x + w.w)), cy = Math.max(w.y, Math.min(mousePos.y, w.y + w.h));
                    if (Math.abs(Math.hypot(mousePos.x - cx, mousePos.y - cy) - sonarRadius) < 20) wallAlphaState[i] = 1.0;
                });
            }

            walls.forEach((w, i) => {
                const a = levelCleared ? 0.15 : wallAlphaState[i];
                if (a > 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${a * 0.4})`; ctx.fillRect(w.x, w.y, w.w, w.h);
                    ctx.strokeStyle = `rgba(0, 200, 255, ${a})`; ctx.strokeRect(w.x, w.y, w.w, w.h);
                }
            });

            ctx.fillStyle = SPLAT_COLOR;
            splats.forEach(s => {
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); 
                ctx.fill();
            });

            ctx.fillStyle = GOAL_COLOR; ctx.shadowBlur = 15; ctx.shadowColor = GOAL_COLOR;
            ctx.beginPath(); ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

            ctx.fillStyle = isDead ? '#444' : '#fff';
            ctx.beginPath(); ctx.arc(mousePos.x, mousePos.y, 4, 0, Math.PI*2); ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (!isDead && sonarCooldown === 0) { sonarActive = true; sonarRadius = 0; sonarCooldown = SONAR_COOLDOWN_TIME; }
        });
        window.addEventListener('resize', resize);
        window.onload = () => { resize(); isDead = true; draw(); };
    </script>
</body>
</html>
