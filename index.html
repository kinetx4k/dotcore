<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Maze - Procedural Darkness</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            user-select: none;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            transition: opacity 0.5s;
            z-index: 100;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #level-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
        }

        #ability-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
        }

        .sonar-ready { color: #00FF00; font-weight: bold; }
        .sonar-charging { color: #666; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-indicator">Level 1</div>
    </div>

    <div id="ability-bar"></div>

    <div id="message-box">
        <div id="tutorial">
            <h2>Welcome to the Darkness</h2>
            <p>The maze is now <strong>randomly generated</strong>.</p>
            <p>Sonar cooldown is now <strong>10 seconds</strong>.</p>
            <p style="color: #4CAF50;">Move to the top-left circle to start.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelIndicator = document.getElementById('level-indicator');
        const messageBox = document.getElementById('message-box');
        const abilityBar = document.getElementById('ability-bar');

        let currentLevel = 0;
        let isDead = false;
        let gameStarted = false;
        let levelCleared = false; 
        let mousePos = { x: 0, y: 0 };
        let splats = []; 
        let walls = []; 
        let goal = { x: 0, y: 0, radius: 15 };
        let startZone = { x: 50, y: 50, radius: 40 };

        let sonarUnlocked = true;
        let sonarActive = false;
        let sonarRadius = 0;
        let sonarCooldown = 0;
        const SONAR_MAX_RADIUS = 1000;
        const SONAR_SPEED = 12;
        const SONAR_COOLDOWN_TIME = 600; // 10 seconds at 60fps
        let wallAlphaState = [];

        const SPLAT_RADIUS = 8;
        const GOAL_COLOR = '#00FF00';
        const SPLAT_COLOR = 'rgba(200, 0, 0, 0.7)';

        /**
         * COMPLEX MAZE GENERATOR
         * Uses Recursive Backtracking to ensure a solvable path.
         */
        class MazeGenerator {
            constructor(cols, rows) {
                this.cols = cols;
                this.rows = rows;
                this.grid = [];
                for (let r = 0; r < rows; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < cols; c++) {
                        this.grid[r][c] = { r, c, visited: false, walls: [true, true, true, true] }; // Top, Right, Bottom, Left
                    }
                }
            }

            generate() {
                const stack = [];
                const start = this.grid[0][0];
                start.visited = true;
                stack.push(start);

                while (stack.length > 0) {
                    const current = stack.pop();
                    const neighbors = this.getNeighbors(current);

                    if (neighbors.length > 0) {
                        stack.push(current);
                        const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                        this.removeWalls(current, next);
                        next.visited = true;
                        stack.push(next);
                    }
                }
                return this.convertToRects();
            }

            getNeighbors(cell) {
                const neighbors = [];
                const { r, c } = cell;
                if (r > 0 && !this.grid[r - 1][c].visited) neighbors.push(this.grid[r - 1][c]);
                if (r < this.rows - 1 && !this.grid[r + 1][c].visited) neighbors.push(this.grid[r + 1][c]);
                if (c > 0 && !this.grid[r][c - 1].visited) neighbors.push(this.grid[r][c - 1]);
                if (c < this.cols - 1 && !this.grid[r][c + 1].visited) neighbors.push(this.grid[r][c + 1]);
                return neighbors;
            }

            removeWalls(a, b) {
                const dr = a.r - b.r;
                const dc = a.c - b.c;
                if (dr === 1) { a.walls[0] = false; b.walls[2] = false; }
                else if (dr === -1) { a.walls[2] = false; b.walls[0] = false; }
                if (dc === 1) { a.walls[3] = false; b.walls[1] = false; }
                else if (dc === -1) { a.walls[1] = false; b.walls[3] = false; }
            }

            convertToRects() {
                const rects = [];
                const cellW = canvas.width / this.cols;
                const cellH = canvas.height / this.rows;
                const thickness = 10 + (currentLevel * 2);

                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        const cell = this.grid[r][c];
                        const x = c * cellW;
                        const y = r * cellH;
                        if (cell.walls[0]) rects.push({ x, y, w: cellW, h: thickness }); // Top
                        if (cell.walls[1]) rects.push({ x: x + cellW - thickness, y, w: thickness, h: cellH }); // Right
                        if (cell.walls[2]) rects.push({ x, y: y + cellH - thickness, w: cellW, h: thickness }); // Bottom
                        if (cell.walls[3]) rects.push({ x, y, w: thickness, h: cellH }); // Left
                    }
                }
                return rects;
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupLevel();
        }

        function setupLevel() {
            levelIndicator.innerText = `Level ${currentLevel + 1}: Procedural Chaos`;
            
            // Scaling difficulty: more rows and columns per level
            const complexity = 4 + currentLevel;
            const generator = new MazeGenerator(Math.floor(complexity * 1.5), complexity);
            const allWalls = generator.generate();

            // Clear space around start and goal
            walls = allWalls.filter(w => {
                const distToStart = Math.hypot((w.x + w.w/2) - startZone.x, (w.y + w.h/2) - startZone.y);
                const distToGoal = Math.hypot((w.x + w.w/2) - (canvas.width - 50), (w.y + w.h/2) - (canvas.height - 50));
                return distToStart > 80 && distToGoal > 80;
            });

            wallAlphaState = walls.map(() => 0);
            goal.x = canvas.width - 50;
            goal.y = canvas.height - 50;
        }

        function checkCollision(x, y) {
            for (let wall of walls) {
                if (x > wall.x && x < wall.x + wall.w && y > wall.y && y < wall.y + wall.h) return true;
            }
            const b = 2;
            return (x <= b || x >= canvas.width - b || y <= b || y >= canvas.height - b);
        }

        function update() {
            if (sonarCooldown > 0) {
                sonarCooldown--;
                const percent = Math.floor((1 - sonarCooldown / SONAR_COOLDOWN_TIME) * 100);
                abilityBar.innerHTML = `<span class="sonar-charging">Sonar Recharging: ${percent}%</span>`;
                if (sonarCooldown === 0) abilityBar.innerHTML = '<span class="sonar-ready">Sonar Ready: [Right Click]</span>';
            }

            if (sonarActive) {
                sonarRadius += SONAR_SPEED;
                if (sonarRadius > SONAR_MAX_RADIUS) sonarActive = false;
            }

            for (let i = 0; i < wallAlphaState.length; i++) {
                if (wallAlphaState[i] > 0) wallAlphaState[i] -= 0.01;
            }

            if (isDead) {
                if (Math.hypot(mousePos.x - startZone.x, mousePos.y - startZone.y) < startZone.radius) {
                    if (levelCleared) {
                        currentLevel++;
                        splats = [];
                        setupLevel();
                        levelCleared = false;
                    }
                    isDead = false;
                    messageBox.classList.add('hidden');
                    gameStarted = true;
                }
            } else if (gameStarted) {
                if (checkCollision(mousePos.x, mousePos.y)) {
                    splats.push({ x: mousePos.x, y: mousePos.y, r: SPLAT_RADIUS + Math.random() * 5 });
                    isDead = true;
                    messageBox.innerHTML = "<h2>You Died!</h2><p>Return to the start (top left).</p>";
                    messageBox.classList.remove('hidden');
                } else if (Math.hypot(mousePos.x - goal.x, mousePos.y - goal.y) < goal.radius) {
                    levelCleared = true;
                    isDead = true;
                    messageBox.innerHTML = "<h2>Level Clear!</h2><p>Return to start for a harder maze.</p>";
                    messageBox.classList.remove('hidden');
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isDead) {
                ctx.beginPath();
                ctx.arc(startZone.x, startZone.y, startZone.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#333';
                ctx.stroke();
            }

            if (sonarActive) {
                ctx.beginPath();
                ctx.arc(mousePos.x, mousePos.y, sonarRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 150, 255, ${1 - (sonarRadius / SONAR_MAX_RADIUS)})`;
                ctx.stroke();

                walls.forEach((w, i) => {
                    const cx = Math.max(w.x, Math.min(mousePos.x, w.x + w.w));
                    const cy = Math.max(w.y, Math.min(mousePos.y, w.y + w.h));
                    if (Math.abs(Math.hypot(mousePos.x - cx, mousePos.y - cy) - sonarRadius) < 30) wallAlphaState[i] = 1.0;
                });
            }

            walls.forEach((w, i) => {
                const alpha = levelCleared ? 0.2 : wallAlphaState[i];
                if (alpha > 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                    ctx.strokeStyle = `rgba(0, 200, 255, ${alpha})`;
                    ctx.strokeRect(w.x, w.y, w.w, w.h);
                }
            });

            ctx.fillStyle = SPLAT_COLOR;
            splats.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = GOAL_COLOR;
            ctx.shadowBlur = 15;
            ctx.shadowColor = GOAL_COLOR;
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = isDead ? '#444' : '#fff';
            ctx.beginPath();
            ctx.arc(mousePos.x, mousePos.y, 4, 0, Math.PI * 2);
            ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (!isDead && sonarCooldown === 0) {
                sonarActive = true;
                sonarRadius = 0;
                sonarCooldown = SONAR_COOLDOWN_TIME;
            }
        });
        window.addEventListener('resize', resize);
        window.onload = () => { resize(); isDead = true; draw(); };
    </script>
</body>
</html>
