<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Quest Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-med: #16213e;
            --accent: #e94560;
            --secondary: #4ecca3;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            image-rendering: pixelated;
            background-color: var(--bg-med);
            border: 4px solid #0f3460;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .pixel-border {
            border: 4px solid #0f3460;
            image-rendering: pixelated;
        }

        .btn {
            transition: transform 0.1s;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f3460; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Auth / Initializing Overlay -->
    <div id="authOverlay" class="fixed inset-0 z-[100] bg-[#1a1a2e] flex flex-col items-center justify-center text-center">
        <h1 class="text-3xl text-yellow-400 mb-8">QUEST EXPLORER</h1>
        <div class="loading-dots text-xl">Initializing Multiplayer</div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="hidden flex flex-col items-center gap-6 max-w-md w-full">
        <h1 class="text-2xl text-yellow-400 mb-4">MULTIPLAYER</h1>
        
        <div class="bg-[#16213e] p-6 rounded-xl border-4 border-[#0f3460] w-full">
            <h2 class="text-xs mb-4 text-gray-400">YOUR IDENTITY</h2>
            <div class="flex items-center gap-4 mb-6">
                <div id="playerPreview" class="w-12 h-12 rounded border-2 border-white"></div>
                <input id="userNameInput" type="text" placeholder="Enter Name" maxlength="10" class="flex-1 bg-black/30 border-2 border-[#0f3460] p-2 text-[10px] outline-none focus:border-yellow-500">
            </div>

            <button id="createLobbyBtn" class="btn w-full bg-green-600 hover:bg-green-700 p-4 rounded text-xs mb-3">CREATE LOBBY</button>
            
            <div class="flex gap-2">
                <input id="lobbyCodeInput" type="text" placeholder="CODE" maxlength="5" class="w-1/3 bg-black/30 border-2 border-[#0f3460] p-2 text-[10px] uppercase text-center outline-none focus:border-yellow-500">
                <button id="joinLobbyBtn" class="btn flex-1 bg-blue-600 hover:bg-blue-700 p-4 rounded text-xs">JOIN LOBBY</button>
            </div>
        </div>

        <div class="text-[8px] text-gray-500 mt-4 leading-relaxed">
            Move: WASD • Goal: Collect Gems together • Multiplayer synced via Cloud
        </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="hidden flex flex-col items-center gap-6 max-w-md w-full">
        <h1 class="text-xl text-yellow-400">LOBBY: <span id="displayLobbyCode" class="text-white">-----</span></h1>
        
        <div class="bg-[#16213e] p-6 rounded-xl border-4 border-[#0f3460] w-full min-h-[200px]">
            <h2 class="text-xs mb-4 text-gray-400">PLAYERS WAITING</h2>
            <div id="lobbyPlayerList" class="space-y-2">
                <!-- Players injected here -->
            </div>
        </div>

        <div class="flex gap-4 w-full">
            <button id="backToMenuBtn" class="btn flex-1 bg-red-600 hover:bg-red-700 p-4 rounded text-[10px]">LEAVE</button>
            <button id="startGameBtn" class="btn flex-1 bg-yellow-500 hover:bg-yellow-600 text-black p-4 rounded text-[10px] hidden">START GAME</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden flex flex-col items-center">
        <div class="mb-4 flex justify-between w-full items-center px-2">
            <div class="flex flex-col gap-1">
                <div class="text-[8px] text-gray-400">LOBBY: <span id="gameLobbyCode"></span></div>
                <div class="text-[10px] text-yellow-400">GEMS: <span id="scoreDisplay">0</span></div>
            </div>
            <div id="playerStats" class="flex gap-2"></div>
        </div>

        <div class="relative">
            <canvas id="gameCanvas"></canvas>
            
            <!-- Chat Overlay -->
            <div class="absolute bottom-4 left-4 right-4 pointer-events-none">
                <div id="chatMessages" class="max-h-24 overflow-y-auto mb-2 flex flex-col gap-1 text-[8px]"></div>
                <div class="flex gap-2 pointer-events-auto">
                    <input id="chatInput" type="text" placeholder="Press T to chat" class="flex-1 bg-black/60 border border-white/20 p-1 text-[8px] outline-none">
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-[#16213e] border-4 border-yellow-500 p-8 rounded-xl text-center max-w-sm">
            <div id="modalEmoji" class="text-5xl mb-4">🏆</div>
            <h2 id="modalTitle" class="text-xl mb-4">WINNER!</h2>
            <p id="modalBody" class="text-[10px] text-gray-300 mb-6 leading-relaxed"></p>
            <button id="modalBtn" class="btn bg-yellow-500 text-black px-8 py-3 text-xs rounded">BACK TO LOBBY</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Setup ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'adventure-multiplayer';

        // --- Game Logic Constants ---
        const TILE_SIZE = 40;
        const GRID_WIDTH = 15;
        const GRID_HEIGHT = 12;
        const MOVE_SPEED = 0.08; // Slow as requested

        // --- State ---
        let user = null;
        let currentLobby = null;
        let lobbyData = null;
        let unsubscribeLobby = null;
        let myPlayerColor = `#${Math.floor(Math.random()*16777215).toString(16)}`;
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = TILE_SIZE * GRID_WIDTH;
        canvas.height = TILE_SIZE * GRID_HEIGHT;

        const keys = {};
        window.addEventListener('keydown', e => {
            if (document.activeElement === document.getElementById('chatInput')) return;
            keys[e.code] = true;
            if (e.code === 'KeyT') {
                e.preventDefault();
                document.getElementById('chatInput').focus();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- UI Selectors ---
        const ui = {
            authOverlay: document.getElementById('authOverlay'),
            mainMenu: document.getElementById('mainMenu'),
            lobbyScreen: document.getElementById('lobbyScreen'),
            gameScreen: document.getElementById('gameScreen'),
            playerPreview: document.getElementById('playerPreview'),
            userNameInput: document.getElementById('userNameInput'),
            lobbyCodeInput: document.getElementById('lobbyCodeInput'),
            playerList: document.getElementById('lobbyPlayerList'),
            modal: document.getElementById('modalOverlay'),
            chatInput: document.getElementById('chatInput'),
            chatMessages: document.getElementById('chatMessages')
        };

        ui.playerPreview.style.backgroundColor = myPlayerColor;

        // --- Initial Auth (Rule 3) ---
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                ui.authOverlay.classList.add('hidden');
                ui.mainMenu.classList.remove('hidden');
                // Recovery logic if needed
            }
        });

        initAuth();

        // --- Firebase Paths (Rule 1) ---
        const getLobbyDoc = (code) => doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', code.toUpperCase());

        // --- Lobby Operations ---
        async function createLobby() {
            if (!user) return;
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            const name = ui.userNameInput.value || "Explorer";
            
            // Generate Map
            const walls = [];
            const gems = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (x === 0 || x === GRID_WIDTH - 1 || y === 0 || y === GRID_HEIGHT - 1) walls.push({x, y});
                    else if (Math.random() > 0.85) walls.push({x, y});
                    else if (Math.random() > 0.94) gems.push({x, y, id: Math.random().toString(36).substr(2, 9)});
                }
            }

            const initialLobby = {
                code,
                hostId: user.uid,
                status: 'waiting',
                walls: JSON.stringify(walls),
                gems: gems,
                messages: [],
                players: {
                    [user.uid]: {
                        id: user.uid,
                        name,
                        color: myPlayerColor,
                        x: 1, y: 1, targetX: 1, targetY: 1,
                        score: 0,
                        lastSeen: Date.now()
                    }
                }
            };

            await setDoc(getLobbyDoc(code), initialLobby);
            joinLobby(code);
        }

        async function joinLobby(code) {
            if (!user) return;
            const lobbyRef = getLobbyDoc(code);
            const snap = await getDoc(lobbyRef);

            if (!snap.exists()) {
                alert("Lobby not found!");
                return;
            }

            const name = ui.userNameInput.value || "Explorer";
            const currentPlayers = snap.data().players || {};
            
            // Add self
            currentPlayers[user.uid] = {
                id: user.uid,
                name,
                color: myPlayerColor,
                x: 1, y: 1, targetX: 1, targetY: 1,
                score: 0,
                lastSeen: Date.now()
            };

            await updateDoc(lobbyRef, { players: currentPlayers });
            startListening(code);
            
            ui.mainMenu.classList.add('hidden');
            ui.lobbyScreen.classList.remove('hidden');
            document.getElementById('displayLobbyCode').innerText = code;
        }

        function startListening(code) {
            if (unsubscribeLobby) unsubscribeLobby();
            currentLobby = code;

            unsubscribeLobby = onSnapshot(getLobbyDoc(code), (snap) => {
                if (!snap.exists()) {
                    exitLobby();
                    return;
                }
                lobbyData = snap.data();
                updateUI();
            }, (err) => console.error("Snapshot error", err));
        }

        function updateUI() {
            if (!lobbyData) return;

            // Lobby Player List
            if (ui.lobbyScreen.offsetParent) {
                ui.playerList.innerHTML = '';
                Object.values(lobbyData.players).forEach(p => {
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-2 bg-black/20 rounded text-[10px]";
                    div.innerHTML = `<div class="w-4 h-4 rounded" style="background:${p.color}"></div><span>${p.name}</span> ${p.id === lobbyData.hostId ? '<span class="text-yellow-400 text-[8px]">[HOST]</span>' : ''}`;
                    ui.playerList.appendChild(div);
                });

                if (user.uid === lobbyData.hostId) {
                    document.getElementById('startGameBtn').classList.remove('hidden');
                }
            }

            // Game Start
            if (lobbyData.status === 'playing' && !ui.gameScreen.offsetParent) {
                ui.lobbyScreen.classList.add('hidden');
                ui.gameScreen.classList.remove('hidden');
                document.getElementById('gameLobbyCode').innerText = lobbyData.code;
            }

            // Sync Messages
            syncChat();
        }

        async function exitLobby() {
            if (unsubscribeLobby) unsubscribeLobby();
            if (currentLobby && user) {
                const ref = getLobbyDoc(currentLobby);
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    const ps = snap.data().players;
                    delete ps[user.uid];
                    if (Object.keys(ps).length === 0) {
                        await deleteDoc(ref);
                    } else {
                        await updateDoc(ref, { players: ps });
                    }
                }
            }
            currentLobby = null;
            ui.lobbyScreen.classList.add('hidden');
            ui.gameScreen.classList.add('hidden');
            ui.mainMenu.classList.remove('hidden');
        }

        async function startGame() {
            if (currentLobby && lobbyData.hostId === user.uid) {
                await updateDoc(getLobbyDoc(currentLobby), { status: 'playing' });
            }
        }

        // --- Chat Logic ---
        async function sendMessage() {
            const text = ui.chatInput.value.trim();
            if (!text || !currentLobby) return;
            ui.chatInput.value = '';
            
            const msgs = lobbyData.messages || [];
            msgs.push({
                sender: lobbyData.players[user.uid].name,
                text: text,
                time: Date.now()
            });
            
            // Keep last 10 messages
            const limited = msgs.slice(-10);
            await updateDoc(getLobbyDoc(currentLobby), { messages: limited });
        }

        function syncChat() {
            if (!lobbyData.messages) return;
            ui.chatMessages.innerHTML = '';
            lobbyData.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = "text-white";
                div.innerHTML = `<span class="text-yellow-400">${m.sender}:</span> ${m.text}`;
                ui.chatMessages.appendChild(div);
            });
            ui.chatMessages.scrollTop = ui.chatMessages.scrollHeight;
        }

        // --- Game Engine ---
        let lastUpdate = 0;
        function gameLoop() {
            if (lobbyData && lobbyData.status === 'playing') {
                updatePhysics();
                drawGame();
            }
            requestAnimationFrame(gameLoop);
        }

        async function updatePhysics() {
            const me = lobbyData.players[user.uid];
            if (!me) return;

            // Move Input
            if (me.x === me.targetX && me.y === me.targetY) {
                let nx = me.targetX;
                let ny = me.targetY;
                if (keys['KeyW']) ny--;
                else if (keys['KeyS']) ny++;
                else if (keys['KeyA']) nx--;
                else if (keys['KeyD']) nx++;

                if (nx !== me.targetX || ny !== me.targetY) {
                    const walls = JSON.parse(lobbyData.walls);
                    if (!walls.some(w => w.x === nx && w.y === ny)) {
                        me.targetX = nx;
                        me.targetY = ny;
                    }
                }
            }

            // Interpolation
            me.x += (me.targetX - me.x) * MOVE_SPEED;
            me.y += (me.targetY - me.y) * MOVE_SPEED;

            if (Math.abs(me.x - me.targetX) < 0.01) me.x = me.targetX;
            if (Math.abs(me.y - me.targetY) < 0.01) me.y = me.targetY;

            // Gem Collection
            let collectedId = null;
            const newGems = (lobbyData.gems || []).filter(gem => {
                const dist = Math.sqrt(Math.pow(me.x - gem.x, 2) + Math.pow(me.y - gem.y, 2));
                if (dist < 0.5) {
                    collectedId = gem.id;
                    return false;
                }
                return true;
            });

            // Network Sync (Throttle to ~10hz)
            const now = Date.now();
            if (now - lastUpdate > 100 || collectedId) {
                const ref = getLobbyDoc(currentLobby);
                const updateObj = { [`players.${user.uid}`]: me };
                if (collectedId) {
                    me.score += 10;
                    updateObj.gems = newGems;
                }
                updateDoc(ref, updateObj);
                lastUpdate = now;
            }

            if (lobbyData.gems && lobbyData.gems.length === 0) {
                showWin();
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const walls = JSON.parse(lobbyData.walls);

            // Walls
            ctx.fillStyle = '#0f3460';
            walls.forEach(w => {
                ctx.fillRect(w.x * TILE_SIZE, w.y * TILE_SIZE, TILE_SIZE - 2, TILE_SIZE - 2);
            });

            // Gems
            ctx.fillStyle = '#e94560';
            (lobbyData.gems || []).forEach(gem => {
                ctx.beginPath();
                ctx.arc(gem.x * TILE_SIZE + TILE_SIZE/2, gem.y * TILE_SIZE + TILE_SIZE/2, 6, 0, Math.PI * 2);
                ctx.fill();
                // Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#e94560';
                ctx.stroke();
                ctx.shadowBlur = 0;
            });

            // Players
            let totalScore = 0;
            Object.values(lobbyData.players).forEach(p => {
                totalScore += p.score;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x * TILE_SIZE + 6, p.y * TILE_SIZE + 6, TILE_SIZE - 12, TILE_SIZE - 12);
                
                // Name Tag
                ctx.fillStyle = 'white';
                ctx.font = '6px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, p.x * TILE_SIZE + TILE_SIZE/2, p.y * TILE_SIZE - 4);

                // Eyes
                ctx.fillStyle = 'white';
                ctx.fillRect(p.x * TILE_SIZE + 12, p.y * TILE_SIZE + 14, 4, 4);
                ctx.fillRect(p.x * TILE_SIZE + 24, p.y * TILE_SIZE + 14, 4, 4);
            });

            document.getElementById('scoreDisplay').innerText = totalScore;
        }

        function showWin() {
            const p = lobbyData.players[user.uid];
            document.getElementById('modalTitle').innerText = "QUEST COMPLETE!";
            document.getElementById('modalBody').innerText = `Your team collected all gems! You contributed ${p.score} points.`;
            ui.modal.classList.remove('hidden');
        }

        // --- Event Listeners ---
        document.getElementById('createLobbyBtn').onclick = createLobby;
        document.getElementById('joinLobbyBtn').onclick = () => {
            const code = ui.lobbyCodeInput.value.trim().toUpperCase();
            if (code) joinLobby(code);
        };
        document.getElementById('startGameBtn').onclick = startGame;
        document.getElementById('backToMenuBtn').onclick = exitLobby;
        document.getElementById('modalBtn').onclick = () => {
            ui.modal.classList.add('hidden');
            exitLobby();
        };
        ui.chatInput.onkeydown = (e) => {
            if (e.key === 'Enter') sendMessage();
        };

        gameLoop();
    </script>
</body>
</html>
