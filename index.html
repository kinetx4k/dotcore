<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg-dark: #0a0a12;
            --bg-med: #1a1a2e;
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            touch-action: none;
            margin: 0;
        }

        canvas {
            image-rendering: pixelated;
            background-color: #000;
            border: 4px solid #1a1a2e;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .pixel-panel {
            background-color: var(--bg-med);
            border: 4px solid #0f3460;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
        }

        .btn {
            background: #0f3460;
            color: white;
            padding: 12px;
            border-bottom: 4px solid #0a0a12;
            transition: all 0.1s;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .neon-text {
            text-shadow: 0 0 10px var(--neon-blue);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Menu -->
    <div id="menu" class="flex flex-col items-center gap-6 w-full max-w-md">
        <h1 class="text-3xl neon-text mb-4">TRON.NET</h1>
        
        <div class="pixel-panel p-6 w-full flex flex-col gap-4">
            <input id="lobbyInput" type="text" placeholder="ENTER CODE" maxlength="5" class="bg-black border-2 border-[#0f3460] p-3 text-center text-xs outline-none focus:border-cyan-400">
            <div class="flex gap-2">
                <button id="joinBtn" class="btn flex-1 text-[10px]">JOIN GAME</button>
                <button id="createBtn" class="btn flex-1 text-[10px]">CREATE LOBBY</button>
            </div>
        </div>
    </div>

    <!-- Lobby -->
    <div id="lobby" class="hidden flex flex-col items-center gap-6 w-full max-w-md">
        <h2 class="text-xl">LOBBY: <span id="lobbyCodeLabel" class="text-cyan-400"></span></h2>
        <div class="pixel-panel p-6 w-full min-h-[150px]">
            <div id="playerList" class="flex flex-col gap-2 text-[10px]">
                <!-- Players -->
            </div>
        </div>
        <button id="startBtn" class="btn w-full text-xs hidden">START INITIALIZATION</button>
    </div>

    <!-- Game -->
    <div id="gameUI" class="hidden flex flex-col items-center gap-4">
        <div class="flex justify-between w-full text-[8px] text-gray-400 px-2">
            <span>CODE: <span id="gameCodeLabel"></span></span>
            <span id="gameStatusLabel">WAITING...</span>
        </div>
        <canvas id="stage"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tron-multiplayer';

        const TILE_SIZE = 10;
        const GRID_SIZE = 40;
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        canvas.width = GRID_SIZE * TILE_SIZE;
        canvas.height = GRID_SIZE * TILE_SIZE;

        let user = null;
        let currentLobby = null;
        let lobbyData = null;
        let myDir = { x: 1, y: 0 };
        let nextDir = { x: 1, y: 0 };
        let lastTick = 0;
        const TICK_RATE = 150; // Moderate speed

        // Rule 3: Auth First
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (!user) signInAnonymously(auth);
        });

        const getLobbyRef = (code) => doc(db, 'artifacts', appId, 'public', 'data', 'lobbies', code);

        async function createLobby() {
            if (!user) return;
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            const ref = getLobbyRef(code);
            const initial = {
                code,
                hostId: user.uid,
                status: 'waiting',
                players: {
                    [user.uid]: { id: user.uid, x: 5, y: 20, dir: { x: 1, y: 0 }, alive: true, trail: [], color: '#00f2ff' }
                }
            };
            await setDoc(ref, initial);
            joinLobby(code);
        }

        async function joinLobby(code) {
            code = code.toUpperCase();
            const ref = getLobbyRef(code);
            currentLobby = code;

            onSnapshot(ref, (snap) => {
                if (!snap.exists()) return;
                lobbyData = snap.data();
                renderLobby();
                if (lobbyData.status === 'playing') startGameUI();
            });

            // Add self if not host
            const snap = await (await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")).getDoc(ref);
            if (snap.exists() && snap.data().hostId !== user.uid) {
                const ps = snap.data().players;
                ps[user.uid] = { id: user.uid, x: 35, y: 20, dir: { x: -1, y: 0 }, alive: true, trail: [], color: '#ff00ea' };
                await updateDoc(ref, { players: ps });
            }

            document.getElementById('menu').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('lobbyCodeLabel').innerText = code;
        }

        function renderLobby() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            Object.values(lobbyData.players).forEach(p => {
                const div = document.createElement('div');
                div.innerText = `> PLAYER_${p.id.substring(0, 4)} [READY]`;
                list.appendChild(div);
            });
            if (user.uid === lobbyData.hostId && Object.keys(lobbyData.players).length >= 2) {
                document.getElementById('startBtn').classList.remove('hidden');
            }
        }

        function startGameUI() {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            document.getElementById('gameCodeLabel').innerText = currentLobby;
            requestAnimationFrame(gameLoop);
        }

        // Input
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'ArrowUp') if (myDir.y === 0) nextDir = { x: 0, y: -1 };
            if (e.key === 's' || e.key === 'ArrowDown') if (myDir.y === 0) nextDir = { x: 0, y: 1 };
            if (e.key === 'a' || e.key === 'ArrowLeft') if (myDir.x === 0) nextDir = { x: -1, y: 0 };
            if (e.key === 'd' || e.key === 'ArrowRight') if (myDir.x === 0) nextDir = { x: 1, y: 0 };
        });

        async function tick() {
            if (!lobbyData || lobbyData.status !== 'playing') return;
            const me = lobbyData.players[user.uid];
            if (!me.alive) return;

            myDir = nextDir;
            const newX = me.x + myDir.x;
            const newY = me.y + myDir.y;

            // Collision check
            let alive = true;
            if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) alive = false;
            
            // Trail collision
            Object.values(lobbyData.players).forEach(p => {
                if (p.trail.some(t => t.x === newX && t.y === newY)) alive = false;
                if (p.x === newX && p.y === newY) alive = false;
            });

            const newTrail = [...me.trail, { x: me.x, y: me.y }];
            
            const ps = lobbyData.players;
            ps[user.uid] = { ...me, x: newX, y: newY, trail: newTrail, alive };
            
            await updateDoc(getLobbyRef(currentLobby), { players: ps });
            
            if (!alive) document.getElementById('gameStatusLabel').innerText = "DISCONNECTED / CRASHED";
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#111';
            for (let i = 0; i < GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i * TILE_SIZE, 0); ctx.lineTo(i * TILE_SIZE, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * TILE_SIZE); ctx.lineTo(canvas.width, i * TILE_SIZE); ctx.stroke();
            }

            if (!lobbyData) return;

            Object.values(lobbyData.players).forEach(p => {
                ctx.fillStyle = p.color;
                // Trail
                p.trail.forEach(t => {
                    ctx.globalAlpha = 0.4;
                    ctx.fillRect(t.x * TILE_SIZE, t.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                });
                // Head
                ctx.globalAlpha = 1.0;
                if (p.alive) {
                    ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                    ctx.fillRect(p.x * TILE_SIZE, p.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    ctx.shadowBlur = 0;
                }
            });
        }

        function gameLoop(now) {
            if (now - lastTick > TICK_RATE) {
                tick();
                lastTick = now;
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Listeners
        document.getElementById('createBtn').onclick = createLobby;
        document.getElementById('joinBtn').onclick = () => {
            const val = document.getElementById('lobbyInput').value;
            if (val) joinLobby(val);
        };
        document.getElementById('startBtn').onclick = async () => {
            await updateDoc(getLobbyRef(currentLobby), { status: 'playing' });
        };

    </script>
</body>
</html>
